name: Build Lampac APK

on:
  workflow_dispatch:
    inputs:
      lampac_url:
        description: 'Lampac server URL (e.g. http://192.168.1.50:9118)'
        required: true
        default: 'http://192.168.1.100:9118'

permissions:
  contents: write

jobs:
  build:
    name: Build Lampac APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Configure lampac URL
        run: |
          echo "lampacUrl=${{ github.event.inputs.lampac_url }}" >> gradle.properties
          echo "Using lampac URL: ${{ github.event.inputs.lampac_url }}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Lampac debug APK
        run: ./gradlew assembleLampacDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-lampac-debug
          path: app/build/outputs/apk/lampac/debug/app-lampac-debug.apk